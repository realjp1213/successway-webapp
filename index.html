<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuccessWay — Inicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1530;
    --ink-soft:#6a6480;
    --paper:#fbf7ef;
    --card:#ffffff;
    --line:#ece5d7;
    --brand:#6c4cf1;
    --brand-deep:#4a30c9;
    --lime:#c8f54a;
    --coral:#ff7a59;
    --sky:#46c6ff;
    --mint:#34d8a0;
    --shadow:0 16px 38px -18px rgba(45,30,90,.42);
    --shadow-sm:0 8px 20px -12px rgba(45,30,90,.4);
    --r:24px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Outfit',system-ui,sans-serif;color:var(--ink);
    background:#d9d2e8;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;
    padding:26px 14px;-webkit-font-smoothing:antialiased;
  }
  h1,.serif{font-family:'Fraunces',Georgia,serif}
  .phone{
    width:392px;max-width:100%;background:var(--paper);border-radius:42px;
    box-shadow:0 40px 90px -30px rgba(30,18,70,.6), 0 0 0 11px #14101f, 0 0 0 13px #2a2340;
    overflow:hidden;position:relative;min-height:842px;display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:148px;height:26px;background:#14101f;border-radius:0 0 18px 18px;z-index:40}
  .nav{
    display:flex;align-items:center;justify-content:center;
    padding:34px 20px 14px;background:var(--paper);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.06rem;letter-spacing:-.02em}
  .brand .glyph{
    width:30px;height:30px;border-radius:10px;background:linear-gradient(140deg,var(--brand),var(--brand-deep));
    display:grid;place-items:center;color:#fff;font-family:'Fraunces';font-weight:900;font-size:.95rem;
    transform:rotate(-6deg);box-shadow:var(--shadow-sm);
  }
  .body{flex:1;overflow-y:auto;padding:26px 20px 30px;scrollbar-width:none}
  .body::-webkit-scrollbar{display:none}
  .greet{margin-bottom:6px;font-size:.82rem;font-weight:600;color:var(--ink-soft)}
  h1{font-size:1.62rem;line-height:1.18;letter-spacing:-.02em;margin-bottom:4px}
  h1 span{position:relative;white-space:nowrap}
  h1 span::after{content:"";position:absolute;left:-2px;right:-2px;bottom:2px;height:8px;background:var(--lime);z-index:-1;border-radius:3px}
  .sub{color:var(--ink-soft);font-size:.88rem;margin:8px 0 24px;line-height:1.5}
  .link{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:20px;margin-bottom:14px;box-shadow:var(--shadow-sm);cursor:pointer;
    display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    transition:transform .2s, box-shadow .2s;
  }
  .link:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .ic{
    width:54px;height:54px;border-radius:16px;display:grid;place-items:center;flex-shrink:0;
    font-size:1.5rem;box-shadow:var(--shadow-sm);
  }
  .ic.a{background:linear-gradient(155deg,var(--brand),var(--brand-deep))}
  .ic.b{background:linear-gradient(155deg,var(--sky),#1a7fb0)}
  .ic.c{background:linear-gradient(155deg,var(--mint),#1d9168)}
  .ic.d{background:linear-gradient(155deg,var(--coral),#c14d2c)}
  .l-id{flex:1;min-width:0}
  .l-id .t{font-family:'Fraunces';font-weight:700;font-size:1.12rem;line-height:1.2}
  .l-id .d{font-size:.78rem;color:var(--ink-soft);font-weight:600;margin-top:3px}
  .go{
    width:36px;height:36px;border-radius:50%;background:var(--ink);color:var(--paper);
    display:grid;place-items:center;font-size:1rem;flex-shrink:0;transition:.2s;
  }
  .link:hover .go{background:var(--brand);transform:translateX(3px)}
  .empty{
    border:2px dashed #cdc4b2;border-radius:var(--r);padding:22px;text-align:center;
    color:var(--ink-soft);font-weight:600;font-size:.85rem;line-height:1.5;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="nav">
    <div class="brand"><span class="glyph">S</span>SuccessWay</div>
  </div>
  <div class="body">
    <div class="greet">Hola 👋</div>
    <h1>Mockups de <span>SuccessWay</span></h1>
    <p class="sub">Páginas disponibles. Agrega más editando solo el array <code>pages</code> en este archivo.</p>
    <div id="list"></div>
  </div>
</div>
<script>
  // ─── Add a new page? Add one line here. Nothing else changes. ───
  const pages = [
    { file:'uni-paths-mockup.html',     icon:'🎓', cls:'a', title:'Caminos universitarios', desc:'Universidades emparejadas y progreso' },
    { file:'uni-success-path-mockup.html',      icon:'🌉', cls:'b', title:'Camino: Arizona State', desc:'Construye el puente hacia tu universidad' },
    // { file:'questionnaire.html', icon:'📝', cls:'b', title:'Cuestionario',          desc:'Preguntas sobre notas, intereses y metas' },
  ];

  const list = document.getElementById('list');
  if(pages.length === 0){
    list.innerHTML = '<div class="empty">Aún no hay páginas. Agrega una al array <code>pages</code>.</div>';
  } else {
    list.innerHTML = pages.map(p => `
      <a class="link" href="${p.file}">
        <div class="ic ${p.cls}">${p.icon}</div>
        <div class="l-id">
          <div class="t">${p.title}</div>
          <div class="d">${p.desc}</div>
        </div>
        <div class="go">→</div>
      </a>
    `).join('');
  }
</script>
</body>
</html>
